name: CI
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
    steps:
      - uses: actions/checkout@v2
      - name: Install modules
        run: npm install
      - name: Run tests
        run: npm test
